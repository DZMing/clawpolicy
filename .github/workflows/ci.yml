name: CI

on:
  push:
    branches: [main, master, "release/**", "fix/**", "feat/**"]
  pull_request:

jobs:
  type-check:
    name: Type Check / ubuntu / py3.11
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run mypy
        run: python -m mypy lib tests scripts/check_docs_consistency.py

  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Docs consistency
        run: python scripts/check_docs_consistency.py

  phase3-smoke:
    name: Phase3 smoke / ubuntu / py3.11
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
          python -m pip install -e .

      - name: Run phase3 tests (graceful fallback path)
        run: python -m pytest tests/test_phase3.py -v

  phase3-full-deps:
    name: Phase3 full deps / ubuntu / py3.11
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install full optional dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-full.txt
          python -m pip install pytest
          python -m pip install -e .

      - name: Run phase3 tests with full deps
        run: python -m pytest tests/test_phase3.py -v
